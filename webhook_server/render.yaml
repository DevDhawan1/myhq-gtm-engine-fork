services:
  - type: web
    name: apollo-webhook
    runtime: python
    plan: free
    rootDir: webhook_server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: APOLLO_WEBHOOK_SECRET
        sync: false
